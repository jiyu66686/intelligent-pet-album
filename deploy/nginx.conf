server {
    listen 80;
    # 你的ECS公网IP就是服务器名
    server_name 121.43.24.232;

    # 前端静态文件路径
    location / {
        root /var/www/pet-album/frontend;
        try_files $uri $uri/ /index.html;
    }

    # 代理后端的API请求
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 代理上传的图片文件
    location /uploads {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }
}